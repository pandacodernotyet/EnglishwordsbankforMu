<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈 单词发音魔法书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: bounce 2s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 { font-size: 2.5em; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        .controls {
            display: flex; gap: 10px; margin-bottom: 20px;
            flex-wrap: wrap; justify-content: center;
        }
        .unit-btn {
            padding: 12px 24px; border: none; border-radius: 25px;
            background: white; color: #667eea; font-size: 1em;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .unit-btn:hover { transform: translateY(-3px); }
        .unit-btn.active { background: #ffd93d; color: #333; }
        .search-box {
            width: 100%; max-width: 400px; margin: 0 auto 20px;
            position: relative;
        }
        .search-box input {
            width: 100%; padding: 15px 20px; border: none;
            border-radius: 30px; font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none;
        }
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .word-card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s; cursor: pointer;
        }
        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .word-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
        }
        .word-text { font-size: 2em; font-weight: bold; color: #333; }
        .phonetic { color: #666; font-size: 0.9em; margin-top: 5px; }
        .speaker-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 1.5em; cursor: pointer;
        }
        .meaning {
            font-size: 1.3em; color: #555; margin-bottom: 15px;
            padding-bottom: 15px; border-bottom: 2px dashed #eee;
        }
        .memory-trick {
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            border-radius: 15px; padding: 15px; margin-top: 10px;
        }
        .trick-title { font-weight: bold; color: #d63031; margin-bottom: 8px; }
        .trick-content { color: #2d3436; line-height: 1.6; }
        .category-tag {
            display: inline-block; padding: 5px 12px;
            background: #74b9ff; color: white;
            border-radius: 15px; font-size: 0.8em; margin-top: 10px;
        }
        .stats { text-align: center; color: white; margin-bottom: 20px; }
        .empty-state { text-align: center; color: white; padding: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎈 单词发音魔法书</h1>
            <p class="subtitle">人教版三年级下册 · 谐音记忆</p>
        </header>
        <div class="stats" id="stats">加载中...</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入单词或中文搜索...">
        </div>
        <div class="controls">
            <button class="unit-btn active" onclick="filterUnit('all')">全部</button>
            <button class="unit-btn" onclick="filterUnit('1')">Unit 1</button>
            <button class="unit-btn" onclick="filterUnit('2')">Unit 2</button>
            <button class="unit-btn" onclick="filterUnit('3')">Unit 3</button>
            <button class="unit-btn" onclick="filterUnit('4')">Unit 4</button>
            <button class="unit-btn" onclick="filterUnit('5')">Unit 5</button>
        </div>
        <div class="word-grid" id="wordGrid"></div>
    </div>

    <script>
        const wordDatabase = [
            { word: "Happy Birthday", meaning: "生日快乐", unit: "1", trick: "嗨皮+波丝得=嗨皮的博士得了A！" },
            { word: "grandpa", meaning: "爷爷", unit: "1", trick: "格朗怕=隔代怕的是爷爷" },
            { word: "grandma", meaning: "奶奶", unit: "1", trick: "个软妈=一个软软的妈妈" },
            { word: "one", meaning: "一", unit: "1", trick: "万→one，弯弯的棍子" },
            { word: "two", meaning: "二", unit: "1", trick: "two=兔，两只耳朵" },
            { word: "three", meaning: "三", unit: "1", trick: "思瑞=三思而后瑞" },
            { word: "red", meaning: "红色", unit: "1", trick: "热爱的红色" },
            { word: "blue", meaning: "蓝色", unit: "1", trick: "不录=蓝天不录视频" },
            { word: "yellow", meaning: "黄色", unit: "1", trick: "爷漏=爷爷漏出黄色" },
            { word: "run", meaning: "跑", unit: "1", trick: "软=跑起来腿软" },
            { word: "swim", meaning: "游泳", unit: "1", trick: "死命=死命游" },
            { word: "aunt", meaning: "阿姨", unit: "2", trick: "昂特=昂首特别优雅" },
            { word: "uncle", meaning: "叔叔", unit: "2", trick: "昂扣=昂头扣帽子" },
            { word: "doctor", meaning: "医生", unit: "2", trick: "倒克特=倒着克服" },
            { word: "farmer", meaning: "农民", unit: "2", trick: "发么=发财了么" },
            { word: "driver", meaning: "司机", unit: "2", trick: "拽我=司机拽我上车" },
            { word: "angry", meaning: "生气", unit: "2", trick: "安格瑞=安格瑞很生气" },
            { word: "happy", meaning: "高兴", unit: "2", trick: "嗨皮=嗨！皮一下" },
            { word: "farm", meaning: "农场", unit: "3", trick: "发母=发母鸡" },
            { word: "chicken", meaning: "鸡", unit: "3", trick: "吃肯=吃肯德基" },
            { word: "sheep", meaning: "羊", unit: "3", trick: "睡扑=睡扑在地上" },
            { word: "horse", meaning: "马", unit: "3", trick: "耗死=马跑耗死敌人" },
            { word: "spring", meaning: "春天", unit: "3", trick: "死不硬=冰死不硬了" },
            { word: "summer", meaning: "夏天", unit: "3", trick: "萨默=萨默天好热" },
            { word: "autumn", meaning: "秋天", unit: "3", trick: "奥特们=奥特曼打落叶" },
            { word: "winter", meaning: "冬天", unit: "3", trick: "温特=冬天温特暖和" },
            { word: "travel", meaning: "旅行", unit: "4", trick: "踹我=旅行踹我上车" },
            { word: "plane", meaning: "飞机", unit: "4", trick: "普累恩=坐飞机不累" },
            { word: "ship", meaning: "船", unit: "4", trick: "谁扑=谁扑通上船" },
            { word: "left", meaning: "左", unit: "4", trick: "来福特=来福特在左边" },
            { word: "right", meaning: "右", unit: "4", trick: "瑞爱特=瑞爱特向右" },
            { word: "water", meaning: "水", unit: "4", trick: "沃特=沃特要喝水" },
            { word: "noodle", meaning: "面条", unit: "4", trick: "努豆=努力吃豆豆" },
            { word: "milk", meaning: "牛奶", unit: "4", trick: "密欧克=喝牛奶长高" },
            { word: "China", meaning: "中国", unit: "5", trick: "拆哪=中国建设快" },
            { word: "star", meaning: "星星", unit: "5", trick: "死大=死大的星星" },
            { word: "green", meaning: "绿色", unit: "5", trick: "格林=格林童话绿色" },
            { word: "love", meaning: "爱", unit: "5", trick: "拉我=爱就是拉我一把" },
            { word: "fish", meaning: "鱼", unit: "5", trick: "飞是=飞是鱼跃水面" },
            { word: "hot pot", meaning: "火锅", unit: "5", trick: "好烫+破特=好烫的锅" },
            { word: "great", meaning: "伟大", unit: "5", trick: "格瑞特=格瑞特真伟大" },
            { word: "city", meaning: "城市", unit: "5", trick: "谁踢=谁踢进城市" },
            { word: "people", meaning: "人们", unit: "5", trick: "皮剖=皮剖是人们" }
        ];

        let currentUnit = 'all';
        let filteredWords = [];

        function renderWords(words) {
            const grid = document.getElementById('wordGrid');
            if (words.length === 0) {
                grid.innerHTML = '<div class="empty-state">😅 没找到这个单词</div>';
                return;
            }
            grid.innerHTML = words.map(item => `
                <div class="word-card" onclick="speak('${item.word}')">
                    <div class="word-header">
                        <div>
                            <div class="word-text">${item.word}</div>
                        </div>
                        <button class="speaker-btn" onclick="event.stopPropagation(); speak('${item.word}')">🔊</button>
                    </div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="memory-trick">
                        <div class="trick-title">💡 谐音记忆</div>
                        <div class="trick-content">${item.trick}</div>
                    </div>
                    <span class="category-tag">Unit ${item.unit}</span>
                </div>
            `).join('');
            document.getElementById('stats').textContent = `显示 ${words.length} 个单词`;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        }

        function filterUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(unit === 'all' ? '全部' : unit));
            });
            filteredWords = unit === 'all' ? wordDatabase : wordDatabase.filter(w => w.unit === unit);
            document.getElementById('searchInput').value = '';
            renderWords(filteredWords);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const results = term === '' ? filteredWords : wordDatabase.filter(w => 
                w.word.toLowerCase().includes(term) || w.meaning.includes(term)
            );
            renderWords(results);
        });

        filterUnit('all');
    </script>
</body>
</html>
